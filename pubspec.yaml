name: zora
description: A modern streaming app by farou9
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  #intl: ^0.18.1  # Required for internationalizati
  webview_flutter: ^4.7.0
  # UI & Responsive
  flutter_screenutil: ^5.9.0
   # لفك ضغط ملفات ZIP
  archive: ^3.4.0
  # Networking
  http: ^1.1.0

  wakelock_plus: ^1.2.0


  # Storage
  shared_preferences: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2
  
  # Video Player
  video_player: ^2.8.6
  flutter_inappwebview: ^6.0.0
  
  # Utils
  url_launcher: ^6.2.5
  app_links: ^3.5.0 # Updated version for deep linking (used in main.dart)
  connectivity_plus: ^5.0.2
  aptabase_flutter: ^0.4.0  # Updated version for analytics (used in analytics_service.dart)
  package_info_plus: ^8.0.0
  share_plus: ^7.2.2  # For sharing app (used in about_screen.dart)
  
  # Images
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  
  # Ads
  startapp_sdk: ^1.0.1  # For Start.io ads (used in ad_service.dart)
  
  # QR Code & Deep Links
  qr_flutter: ^4.1.0  # Optional - if you have QR code features
  
  # Firebase (optional - for notifications and updates)
  # firebase_core: ^2.24.2
  # firebase_messaging: ^14.7.10
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  # hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  
  # Generate localization files
  generate: true
  
  assets:
    - lang/app_en.json
    - lang/app_ar.json
  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
        - asset: assets/fonts/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/Tajawal-Black.ttf
          weight: 900